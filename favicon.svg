kind = "web"
previewPath = "/"
title = "Holix"
version = "1.0.0"
id = "artifacts/holix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20510

[services.development]
run = "pnpm --filter @workspace/holix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/holix", "run", "build" ]
publicDir = "artifacts/holix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20510"
BASE_PATH = "/"
